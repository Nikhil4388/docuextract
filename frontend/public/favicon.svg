<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8dee"/>
      <stop offset="100%" style="stop-color:#3a6fd8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>

  <!-- PDF document (left) -->
  <rect x="4" y="10" width="22" height="27" rx="2" fill="white"/>
  <polygon points="20,10 26,10 26,16" fill="#5b8dee"/>
  <line x1="20" y1="10" x2="20" y2="16" stroke="#5b8dee" stroke-width="0.5"/>
  <text x="15" y="29" font-family="Arial" font-weight="bold" font-size="7" fill="#3a6fd8" text-anchor="middle">PDF</text>

  <!-- Arrow -->
  <polygon points="28,28 34,24 34,27 38,27 38,29 34,29 34,32" fill="white"/>

  <!-- Excel icon (right) -->
  <rect x="38" y="10" width="22" height="27" rx="2" fill="white"/>
  <rect x="38" y="10" width="14" height="14" rx="2" fill="#3a6fd8"/>
  <text x="45" y="22" font-family="Arial" font-weight="bold" font-size="10" fill="white" text-anchor="middle">X</text>
  <!-- Grid lines -->
  <line x1="38" y1="28" x2="60" y2="28" stroke="#3a6fd8" stroke-width="1"/>
  <line x1="38" y1="33" x2="60" y2="33" stroke="#3a6fd8" stroke-width="1"/>
  <line x1="49" y1="24" x2="49" y2="37" stroke="#3a6fd8" stroke-width="1"/>

  <!-- Bottom tagline bar -->
  <rect x="4" y="44" width="56" height="14" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="32" y="54" font-family="Arial" font-weight="bold" font-size="7" fill="white" text-anchor="middle">DocuExtract</text>
</svg>
